<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/toys/" />
  <title>みんなのキッズゲーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- タイトル画面 -->
    <header id="topbar" class="hidden">
      <button id="homeBtn" class="ghost-btn">🏠 ホーム</button>
      <div id="scoreBox" class="score-box hidden">⭐ <span id="score">0</span></div>
    </header>

    <main id="screen">
      <!-- カテゴリえらび（ホーム） -->
      <section id="homeScreen" class="screen-page">
        <h1 class="title">🎮 みんなの<br />キッズゲーム</h1>
        <p class="subtitle">あそびを えらんでね</p>
        <div class="cat-grid" id="catGrid"></div>
      </section>

      <!-- 年齢えらび -->
      <section id="ageScreen" class="screen-page hidden">
        <h2 class="title small">👶 としを えらんでね</h2>
        <div class="age-grid" id="ageGrid"></div>
      </section>

      <!-- ゲームえらび -->
      <section id="menuScreen" class="screen-page hidden">
        <h2 id="menuTitle" class="title small"></h2>
        <div class="game-grid" id="gameGrid"></div>
      </section>

      <!-- ゲーム本体 -->
      <section id="gameScreen" class="screen-page hidden">
        <h2 id="gameTitle" class="game-title"></h2>
        <div id="gameArea" class="game-area"></div>
        <div id="gameMessage" class="game-message"></div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
